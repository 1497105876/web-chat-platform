# 文件说明：nginx-chat.conf - Nginx 反向代理配置文件
# 配置 Nginx 作为前端静态资源服务器和后端 API/WebSocket 的反向代理

# 定义后端服务器上游（Node.js 应用监听在本地 3000 端口）
upstream chat_backend {
    server 127.0.0.1:3000;
}

# 主服务器配置块
server {
    # 监听 80 端口（HTTP 默认端口）
    listen 80;
    # 替换为实际域名
    server_name your-domain.com;

    # 静态资源服务：前端 HTML/CSS/JS 文件
    # try_files 先尝试匹配具体文件，再尝试目录，最后回退到 index.html
    location / {
        root /path/to/chat/public;
        try_files $uri $uri/ /index.html;
    }

    # API 接口反向代理：将 /api/ 开头的请求转发到后端 Node.js 服务
    location /api/ {
        proxy_pass http://chat_backend;
        # 传递原始请求头信息，让后端能获取真实客户端地址
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 限制上传文件大小为 5MB，与前端校验保持一致
        client_max_body_size 5m;
    }

    # WebSocket 反向代理：将 /ws 路径的请求升级为 WebSocket 连接
    location /ws {
        proxy_pass http://chat_backend;
        # WebSocket 需要 HTTP/1.1 协议版本
        proxy_http_version 1.1;
        # 设置协议升级头，将 HTTP 连接升级为 WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # WebSocket 长连接超时设为 24 小时，避免空闲断开
        proxy_read_timeout 86400;
    }
}
